name: Deploy Next.js site to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'app/**'
              - 'components/**'
              - 'public/**'
              - 'libs/**'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.js'
              - 'postcss.config.js'
              - 'tsconfig.json'

  build-and-deploy:
    needs: filter
    if: needs.filter.outputs.should_deploy == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        env:
          GITHUB_TOKEN: ${{ secrets.GH_CONTENTS_TOKEN }}
          GA_TRACKING_ID: ${{ secrets.GA_TRACKING_ID }}
        run: npx next build

      - name: Deploy built assets to cloudflare-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to (or create) the cloudflare-pages branch with no history
          git checkout --orphan cloudflare-pages

          # Remove everything except the out/ directory
          git rm -rf --cached .
          find . -mindepth 1 -maxdepth 1 \
            ! -name 'out' \
            ! -name '.git' \
            -exec rm -rf {} +

          # Move all files out of out/ to root (Cloudflare serves from root)
          mv out/* .
          mv out/.* . 2>/dev/null || true
          rmdir out

          # Commit and force-push
          git add -A
          git commit -m "chore: deploy static build [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin cloudflare-pages --force
